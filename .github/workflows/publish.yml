name: Publish Package

on:
  workflow_dispatch:
    inputs:
      npm-tag:
        description: npm dist-tag
        required: false
        default: latest
      dry-run:
        description: Run npm publish with --dry-run
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_NAME}" != "v${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${package_version}"
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ github.event.inputs.npm-tag || 'latest' }}
          DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}
        run: |
          publish_args=(--access public --provenance --tag "$NPM_TAG")
          if [[ "$DRY_RUN" == "true" ]]; then
            publish_args+=(--dry-run)
          fi
          npm publish "${publish_args[@]}"
